<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Piece Bazar Clone</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    {% include "components/header.html" %}

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden transition-opacity duration-300 opacity-0">
        <div class="bg-white w-3/4 h-full shadow-xl p-6 transition-transform duration-300 -translate-x-full">
            <div class="flex justify-between items-center mb-8">
                <span class="text-xl font-black text-[#C24464]">3PIECE BAZAR</span>
                <button id="close-menu" class="text-gray-500 hover:text-[#C24464]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <nav class="flex flex-col space-y-4">
                <a href="/" class="text-gray-800 font-bold uppercase tracking-wider border-b border-gray-100 pb-2">Home</a>
                <a href="/shop/" class="text-gray-800 font-bold uppercase tracking-wider border-b border-gray-100 pb-2">Shop</a>
                <a href="/new-arrivals/" class="text-gray-800 font-bold uppercase tracking-wider border-b border-gray-100 pb-2">New Arrivals</a>
                <a href="/best-sellers/" class="text-gray-800 font-bold uppercase tracking-wider border-b border-gray-100 pb-2">Best Sellers</a>
                <a href="/offers/" class="text-gray-800 font-bold uppercase tracking-wider border-b border-gray-100 pb-2">Offers</a>
                <a href="/blog/" class="text-gray-800 font-bold uppercase tracking-wider border-b border-gray-100 pb-2">Blog</a>
                <a href="/contact/" class="text-gray-800 font-bold uppercase tracking-wider border-b border-gray-100 pb-2">Contact</a>
            </nav>
        </div>
    </div>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include "components/footer.html" %}

    <script>
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const closeMenu = document.getElementById('close-menu');
        const menuContent = mobileMenu.querySelector('div');

        function openMenu() {
            mobileMenu.classList.remove('hidden');
            setTimeout(() => {
                mobileMenu.classList.add('opacity-100');
                menuContent.classList.remove('-translate-x-full');
            }, 10);
        }

        function closeMenuFunc() {
            mobileMenu.classList.remove('opacity-100');
            menuContent.classList.add('-translate-x-full');
            setTimeout(() => {
                mobileMenu.classList.add('hidden');
            }, 300);
        }

        mobileMenuButton.addEventListener('click', openMenu);
        closeMenu.addEventListener('click', closeMenuFunc);
        mobileMenu.addEventListener('click', (e) => {
            if (e.target === mobileMenu) closeMenuFunc();
        });
    </script>

</body>
</html>
