<header class="bg-white z-50">
    <!-- Top Bar -->
    <div class="bg-[#C24464] text-white py-1.5 px-4 text-xs">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex space-x-4">
                <span class="flex items-center"><svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg> +880 123456789</span>
                <span class="flex items-center"><svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"></path><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"></path></svg> info@3piecebazar.com</span>
            </div>
            <div class="hidden md:flex space-x-4">
                <a href="#" class="hover:text-gray-200">Facebook</a>
                <a href="#" class="hover:text-gray-200">Instagram</a>
                <a href="#" class="hover:text-gray-200">YouTube</a>
            </div>
        </div>
    </div>

    <!-- Middle Bar -->
    <div class="border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center space-x-4">
                <!-- Mobile Menu Button -->
                <button id="mobile-menu-button" class="md:hidden text-gray-700 hover:text-[#C24464]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>

                <!-- Logo -->
                <div class="flex-shrink-0">
                    <a href="/" class="text-2xl md:text-3xl font-black text-[#C24464] tracking-tighter">3PIECE BAZAR</a>
                </div>

                <!-- Search -->
                <div class="flex-1 max-w-2xl hidden md:block">
                    <form class="relative">
                        <input type="text" placeholder="Search for products..." class="w-full border-2 border-[#C24464] rounded-full py-2 px-6 focus:outline-none focus:ring-0 text-sm">
                        <button class="absolute right-0 top-0 bottom-0 bg-[#C24464] text-white px-6 rounded-r-full hover:bg-[#a33852] transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </button>
                    </form>
                </div>

                <!-- Icons -->
                <div class="flex items-center space-x-6">
                    <a href="/account/" class="text-gray-700 hover:text-[#C24464] flex flex-col items-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <span class="text-[10px] font-bold uppercase mt-1">Account</span>
                    </a>
                    <a href="/wishlist/" class="text-gray-700 hover:text-[#C24464] flex flex-col items-center relative">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        <span class="absolute -top-1 -right-1 bg-[#C24464] text-white text-[8px] font-bold rounded-full h-3.5 w-3.5 flex items-center justify-center">0</span>
                        <span class="text-[10px] font-bold uppercase mt-1">Wishlist</span>
                    </a>
                    <a href="/cart/" class="text-gray-700 hover:text-[#C24464] flex flex-col items-center relative">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                        <span class="absolute -top-1 -right-1 bg-[#C24464] text-white text-[8px] font-bold rounded-full h-3.5 w-3.5 flex items-center justify-center">0</span>
                        <span class="text-[10px] font-bold uppercase mt-1">Cart</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Bar / Navigation -->
    <div class="bg-white shadow-sm hidden md:block">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <nav class="flex space-x-8 py-3">
                <a href="/" class="text-gray-800 hover:text-[#C24464] text-sm font-bold uppercase tracking-wider">Home</a>
                <a href="/shop/" class="text-gray-800 hover:text-[#C24464] text-sm font-bold uppercase tracking-wider">Shop</a>
                <a href="/new-arrivals/" class="text-gray-800 hover:text-[#C24464] text-sm font-bold uppercase tracking-wider">New Arrivals</a>
                <a href="/best-sellers/" class="text-gray-800 hover:text-[#C24464] text-sm font-bold uppercase tracking-wider">Best Sellers</a>
                <a href="/offers/" class="text-gray-800 hover:text-[#C24464] text-sm font-bold uppercase tracking-wider">Offers</a>
                <a href="/blog/" class="text-gray-800 hover:text-[#C24464] text-sm font-bold uppercase tracking-wider">Blog</a>
                <a href="/contact/" class="text-gray-800 hover:text-[#C24464] text-sm font-bold uppercase tracking-wider">Contact</a>
            </nav>
        </div>
    </div>
</header>
