<section class="py-12 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-bold text-gray-900 uppercase tracking-widest">Best Sellers</h2>
            <div class="h-1 w-16 bg-[#C24464] mx-auto mt-2"></div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            {% for product in products %}
            <div class="flex items-center space-x-4 p-4 rounded-xl border border-gray-50 hover:border-[#C24464] transition-all duration-300 group bg-gray-50/30">
                <div class="w-24 h-32 rounded-lg overflow-hidden flex-shrink-0">
                    <div class="w-24 h-32 rounded-lg overflow-hidden flex-shrink-0">
                        {% if product.image %}
                            <img src="{{ product.image.url }}" 
                                alt="{{ product.name }}" 
                                class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        {% else %}
                            <img src="https://picsum.photos/seed/{{ product.slug }}/300/400" 
                                alt="{{ product.name }}" 
                                class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        {% endif %}

                    </div>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Top Rated</p>
                    <h4 class="text-sm font-bold text-gray-800 truncate group-hover:text-[#C24464] transition-colors mb-2">{{product.name}}</h4>
                    <p class="text-lg font-black text-[#C24464]">{{product.price}} BDT</p>
                    <div class="flex text-yellow-400 mt-1">
                        <svg class="w-3 h-3 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>

        </div>
