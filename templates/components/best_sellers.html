<section class="py-12 bg-white">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

<div class="text-center mb-10">
<h2 class="text-2xl font-bold text-gray-900 uppercase tracking-widest">Best Sellers</h2>
<div class="h-1 w-16 bg-[#C24464] mx-auto mt-2"></div>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">

{% for product in best_sellers %}

<a href="{% url 'catalog:product_detail' product.slug %}">

<div class="flex items-center space-x-4 p-4 rounded-xl border border-gray-50 hover:border-[#C24464] transition-all duration-300 group bg-gray-50/30">

<div class="w-24 h-32 rounded-lg overflow-hidden flex-shrink-0">

{% if product.image %}
<img src="{{ product.image.url }}"
alt="{{ product.name }}"
class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
{% else %}
<img src="https://picsum.photos/seed/{{ product.slug }}/300/400"
alt="{{ product.name }}"
class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
{% endif %}

</div>

<div class="flex-1 min-w-0">

<p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">
{{ product.category.name }}
</p>

<h4 class="text-sm font-bold text-gray-800 truncate group-hover:text-[#C24464] transition-colors mb-2">
{{ product.name }}
</h4>

<p class="text-lg font-black text-[#C24464]">
{{ product.price }} BDT
</p>

</div>

</div>

</a>

{% empty %}
<p>No best sellers available</p>
{% endfor %}

</div>
</div>
</section>
