<section class="py-12 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-bold text-gray-900 uppercase tracking-widest">Shop By Categories</h2>
            <div class="h-1 w-16 bg-[#C24464] mx-auto mt-2"></div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-8">
            {% for category in categories %}
            <a href="/category/{{ category.slug }}/" class="group flex flex-col items-center">
                <div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-2 border-gray-100 group-hover:border-[#C24464] transition-all duration-300 shadow-sm group-hover:shadow-md">
                    <img src="https://picsum.photos/seed/{{ category.slug }}/300/300" alt="{{ category.name }}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="mt-4 text-sm font-bold text-gray-800 group-hover:text-[#C24464] transition-colors uppercase tracking-wide">{{ category.name }}</h3>
            </a>
            {% endfor %}
        </div>
    </div>
</section>
