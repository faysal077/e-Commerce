<section class="py-12 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-bold text-gray-900 uppercase tracking-widest">Featured Products</h2>
            <div class="h-1 w-16 bg-[#C24464] mx-auto mt-2"></div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8">
            {% for product in products %}
            <div class="bg-white rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 group border border-gray-100">
                <div class="aspect-[3/4] overflow-hidden relative">
                    {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    {% else %}
                    <img src="https://picsum.photos/seed/{{ product.slug }}/600/800" alt="{{ product.name }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    {% endif %}
                    <div class="absolute top-2 right-2 flex flex-col space-y-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        <button class="p-2 bg-white rounded-full text-gray-600 hover:text-[#C24464] shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        </button>
                        <button class="p-2 bg-white rounded-full text-gray-600 hover:text-[#C24464] shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                    <div class="absolute bottom-0 left-0 right-0 p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                        <button class="w-full bg-[#C24464] text-white py-2 rounded-md text-sm font-bold uppercase tracking-wider hover:bg-[#a33852]">Add to Cart</button>
                    </div>
                </div>
                <div class="p-4 text-center">
                    <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">
                    {% if product.category_name %}
                        {{ product.category_name }}
                    {% else %}
                        Nokshi Katha
                    {% endif %}
                    </p>
                    <h4 class="text-sm font-bold text-gray-800 mb-2 truncate group-hover:text-[#C24464] transition-colors">{{product.name}}</h4>
                    <p class="text-base font-black text-[#C24464]">{{product.price}} BDT</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
